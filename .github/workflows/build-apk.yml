name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      name: build
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.24.5'
            channel: 'stable'

        - name: Get Flutter dependencies
          run: flutter pub get

        - name: Build Split APKs (release)
          run: flutter build apk --release --split-per-abi --no-tree-shake-icons

        - name: Upload ARM64 APK (modern phones ~20MB)
          uses: actions/upload-artifact@v4
          with:
            name: hbx-short-arm64-apk
            path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            if-no-files-found: error

        - name: Upload ARM APK (older phones ~18MB)
          uses: actions/upload-artifact@v4
          with:
            name: hbx-short-arm-apk
            path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            if-no-files-found: warn
  