name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      name: build
      runs-on: ubuntu-latest
      steps:
        - name: Set up job
          run: echo "Starting HBX Short APK build"

        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.24.5'
            channel: 'stable'

        - name: Get Flutter dependencies
          run: flutter pub get

        - name: Build ARM64 APK (release, smallest size)
          run: flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

        - name: Upload ARM64 APK
          uses: actions/upload-artifact@v4
          with:
            name: hbx-short-arm64-release
            path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

        - name: Build ARM APK (release, older phones)
          run: flutter build apk --release --target-platform android-arm --no-tree-shake-icons

        - name: Upload ARM APK
          uses: actions/upload-artifact@v4
          with:
            name: hbx-short-arm-release
            path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

        - name: Complete job
          run: echo "Build complete! Download artifacts above."
  